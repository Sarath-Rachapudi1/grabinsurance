version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grabinsurance-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app           # hot-reload: code changes reflect immediately
      - db-data:/app/data        # persist SQLite DB across restarts
    environment:
      DATABASE_URL:              sqlite+aiosqlite:///./data/grabinsurance.db
      ANTHROPIC_API_KEY:         ${ANTHROPIC_API_KEY:-}
      LANGCHAIN_API_KEY:         ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2:      ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT:         ${LANGCHAIN_PROJECT:-grabinsurance-dev}
      MOCK_INSURER_SCENARIO:     ${MOCK_INSURER_SCENARIO:-normal}
      WEBHOOK_BASE_URL:          http://backend:8000
      ALLOWED_ORIGINS:           http://localhost:3000,http://frontend:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grabinsurance-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # hot-reload
      - /app/node_modules        # prevent host node_modules override
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
